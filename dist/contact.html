<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Clarla Beauty</title>
    <link rel="stylesheet" href="/css/main.css" />
    <script type="module" src="/js/main.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <a href="/" class="header__logo">Clarla Beauty</a>
        <nav class="header__nav">
          <ul class="header__nav-list">
            <li><a href="/my-work.html" class="header__nav-link">My Work</a></li>
            <li><a href="/services.html" class="header__nav-link">Services</a></li>
            <li><a href="/classes.html" class="header__nav-link">Classes</a></li>
            <li><a href="/beauty-tips.html" class="header__nav-link">Beauty Tips</a></li>
            <li><a href="/about.html" class="header__nav-link">About</a></li>
            <li><a href="/contact.html" class="header__nav-link">Contact</a></li>
          </ul>
        </nav>
        <button class="header__hamburger" aria-label="Menu">
          <span></span>
        </button>
      </div>
    </header>

    <main class="contact">
      <div class="contact__container">
        <h1 class="contact__title">Contact</h1>
        <form class="contact__form" id="contact-form">
          <div class="contact__field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="contact__field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="contact__field">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="contact__submit">Send Message</button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__container">
        <div class="footer__content">
          <div class="footer__section">
            <h3>Clarla Beauty</h3>
            <p>Professional beauty services</p>
          </div>
          <div class="footer__section">
            <h3>Links</h3>
            <div class="footer__links">
              <a href="/my-work.html" class="footer__link">My Work</a>
              <a href="/services.html" class="footer__link">Services</a>
              <a href="/classes.html" class="footer__link">Classes</a>
            </div>
          </div>
          <div class="footer__section">
            <h3>Contact</h3>
            <div class="footer__links">
              <a href="/contact.html" class="footer__link">Get in touch</a>
            </div>
          </div>
        </div>
        <p class="footer__copyright">&copy; 2024 Clarla Beauty. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
